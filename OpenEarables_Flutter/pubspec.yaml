name: running_coach
description: Running coach app based on OpenEarable 2.0 + ESP32 GSR

publish_to: 'none'
version: 1.0.13+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  open_file: ^3.3.2
  open_earable_flutter: ^2.3.0
  flutter_platform_widgets: ^9.0.0
  provider: ^6.1.2
  logger: ^2.5.0
  community_charts_flutter: ^1.0.4
  flutter_svg: ^2.0.17
  flutter_colorpicker: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_bloc: ^9.1.1
  fl_chart: ^1.0.0
  file_picker: ^10.3.7
  mcumgr_flutter: ^0.6.1
  file_selector: ^1.0.3
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  flutter_archive: ^6.0.3
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  go_router: ^14.6.2
  # ESP32 BLE connection
  flutter_blue_plus: ^1.35.3
  permission_handler: ^12.0.1
  # Audio coaching feedback
  audio_session: ^0.1.18
  audioplayers: ^6.1.0
  # Phone pedometer — hardware step detector, BCG-free
  sensors_plus: ^6.1.0
  # Phone battery level for CSV debug columns
  battery_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/apps/posture_tracker/assets/
    - lib/apps/heart_tracker/assets/
    - lib/apps/running_coach/assets/
