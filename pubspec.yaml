name: running_coach
description: Real-time running feedback using OpenEarable 2.0 + ESP32 GSR

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  open_earable_flutter: ^2.3.4    # OpenEarable BLE abstraction
  flutter_blue_plus: ^1.35.3      # ESP32 BLE connection
  flutter_tts: ^4.0.2             # Audio feedback through phone speaker
  provider: ^6.1.2                # State management
  collection: ^1.18.0             # ListQueue / windowed buffers

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
